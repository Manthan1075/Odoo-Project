version: '3.8'

services:
  vendorbridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vendorbridge-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_PATH=/app/data/vendorbridge.db
      - SENDER_EMAIL=${SENDER_EMAIL:-vendorbridge.erp@gmail.com}
      - SENDER_PASSWORD=${SENDER_PASSWORD:-your_app_password}
      - SECRET_KEY=${SECRET_KEY:-vendorbridge_secret_key_2026}
      - ALGORITHM=HS256
      - TOKEN_EXPIRE_HOURS=24
    volumes:
      - ./data:/app/data
      - ./vendorbridge.db:/app/vendorbridge.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - vendorbridge-network

